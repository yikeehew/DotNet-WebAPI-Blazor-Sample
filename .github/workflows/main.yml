name: CI - Build & Test (.NET Blazor)
on:
  push:
    branches:
      - main
      - master
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - master
      - develop
      - feature/**
      
jobs:
  build-and-test:
    runs-on: ubuntu-latest
 
    env:
      Configuration: Release
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
 
      - name: Restore
        run: dotnet restore ./server/StudentManagement.Server.sln
      - name: Restore
        run: dotnet restore ./client/StudentManagement.Client.sln
 
      - name: Build (no restore)
        run: dotnet build ./server/StudentManagement.Server.sln --configuration ${{ env.Configuration }} --no-restore
      - name: Build (no restore)
        run: dotnet build ./client/StudentManagement.Client.sln --configuration ${{ env.Configuration }} --no-restore
        
      - name: Test
        run: dotnet test ./server/StudentManagement.Server.sln --configuration ${{ env.Configuration }} --no-restore
      - name: Test
        run: dotnet test ./client/StudentManagement.Client.sln --configuration ${{ env.Configuration }} --no-restore
